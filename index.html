<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gyanam App</title>

  <link rel="stylesheet" href="style.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
  <script src="app.js" defer></script>
</head>

<body>

<!-- HEADER -->
<div class="header" id="headerTitle">👨‍🎓 Students</div>

<div class="container">

  <!-- STUDENTS -->
  <div id="studentsPage" class="page">
    <input id="studentName" placeholder="Enter student name">

    <button onclick="addStudent(document.getElementById('studentName').value)">
      + Add Student
    </button>

    <div id="studentList"></div>
  </div>

  <!-- RECORDS -->
  <div id="recordsPage" class="page" style="display:none">

    <input id="studentId" placeholder="Student ID">
    <input id="topicId" placeholder="Topic ID">

    <button onclick="
      addRecord(
        document.getElementById('studentId').value,
        document.getElementById('topicId').value
      )
    ">
      + Add Record
    </button>

    <div id="recordList"></div>
  </div>

  <!-- VIEW -->
  <div id="viewPage" class="page" style="display:none">

    <input id="viewStudentId" placeholder="Enter Student ID">

    <button onclick="viewStudentRecords(document.getElementById('viewStudentId').value)">
      Load Records
    </button>

    <div id="viewList"></div>
  </div>

</div>

<!-- BOTTOM NAV ONLY -->
<div class="navbar">

  <a id="navStudents" onclick="switchTab('students')" class="active">
    👨‍🎓<br>Students
  </a>

  <a id="navRecords" onclick="switchTab('records')">
    📝<br>Records
  </a>

  <a id="navView" onclick="switchTab('view')">
    👁<br>View
  </a>

</div>

</body>
</html>
